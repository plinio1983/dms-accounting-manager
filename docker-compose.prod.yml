services:
  tabularium:
    image: ${APP_IMAGE:-tabularium:latest}
    container_name: tabularium
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"
    volumes:
      - tabularium_uploads:/app/public/uploads
    networks:
      cluster_frontend:
        aliases:
          - tabularium
      cluster_backend: {}

  tabularium-db:
    image: postgres:16-alpine
    container_name: tabularium-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tabularium}
      POSTGRES_USER: ${POSTGRES_USER:-tabularium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tabularium_pgdata:/var/lib/postgresql/data
    networks:
      - cluster_backend

  tabularium-cron:
    image: alpine:3.20
    container_name: tabularium-cron
    restart: unless-stopped
    depends_on:
      - tabularium
    env_file:
      - .env.production
    command: >
      sh -c '
        apk add --no-cache curl &&
        echo "0 6 * * * curl -fsS -H \"Authorization: Bearer $$CRON_SECRET\" \"http://tabularium:3000/api/cron/recurring-expenses?task=all\"" > /etc/crontabs/root &&
        crond -f -l 8
      '
    networks:
      - cluster_frontend

volumes:
  tabularium_pgdata:
  tabularium_uploads:

networks:
  cluster_frontend:
    external: true
  cluster_backend:
    external: true
